basehub:
  # Enable node placeholders, to ensure capacity at first login
  nodePlaceholder:
    enabled: false
  jupyterhub-home-nfs:
    gke:
      volumeId: projects/ciroh-jupyterhub-423218/zones/us-central1-b/disks/hub-nfs-homedirs-workshop
    quotaEnforcer:
      config:
        QuotaManager:
          hard_quota: 40 # in GiB
  # Ensure that placeholder nodes are densely packed, making instance-type
  # easier to scale down.
  jupyterhub:
    cull:
      # No pods over 12h long
      maxAge: 43200
    scheduling:
      userScheduler:
        enabled: true
    custom:
      singleuserAdmin:
        extraVolumeMounts:
      homepage:
        gitRepoBranch: unify-logins-2
    singleuser:
      storage:
        extraVolumes:
          002-scratch-session:
            name: scratch-session
            emptyDir:
              # Limit total size, to prevent pod being evicted
              # with over use by any one user. This can be increased,
              # but may need to increase the size of the node disk
              sizeLimit: 5Gi
      profileList:
        # The mem-guarantees are here so k8s doesn't schedule other pods
        # on these nodes. They need to be just under total allocatable
        # RAM on a node, not total node capacity. Values calculated using
        # https://learnk8s.io/kubernetes-instance-calculator
        #
        # FIXME: These are changed to a temporary node sharing setup based on
        #        the legacy choices to help us pre-warm capacity independent on
        #        the choices users end up making and avoiding running into
        #        persistent disk quotas.
        #
        #        Change PR: https://github.com/2i2c-org/infrastructure/pull/2539
        #        Related event: https://github.com/2i2c-org/infrastructure/issues/2520
        #
        #        This is an interim setup, trying to balance the experience of
        #        the previous 1:1 user:node setup with a node sharing setup. It
        #        is not meant to be retained long term!
        #
        #        -[ ] Make this cluster have a node sharing setup like in the
        #             basehub/daskhub template.
        #
      - display_name: Small
        description: ~14 GB RAM, ~1.9 CPUs. Up to ~15 CPUs when available
        profile_options: &profile_options
          image:
            display_name: Image
                # Requested in https://2i2c.freshdesk.com/a/tickets/1387
            choices:
              old:
                display_name: Original Pangeo Notebook base image 2023.09.11
                slug: old
                kubespawner_override:
                  image: quay.io/2i2c/awi-ciroh-image:d9f753c83a6b
              new:
                display_name: New Pangeo Notebook base image 2024.04.08
                default: true
                slug: new
                kubespawner_override:
                  image: quay.io/2i2c/awi-ciroh-image:d86a62ae0b85
              rkernel:
                display_name: Notebook with R and Python kernel
                slug: rkernel
                kubespawner_override:
                  image: quay.io/2i2c/awi-ciroh-image:f7f6aa41555b
              devcon7:
                display_name: CIROH Community NextGen Hub
                slug: devcon7
                kubespawner_override:
                  image: quay.io/awiciroh/ngiab-2i2c:v1.2.3
                  image_pull_policy: Always
              devcon8:
                display_name: Community Assets Computation Hub
                slug: devcon8
                kubespawner_override:
                  image: quay.io/2i2c/awi-ciroh-image:symfluence-v0.8.4
                  image_pull_policy: Always
              devcon1:
                display_name: INFLECT FIM
                slug: devcon1
                kubespawner_override:
                  image: quay.io/awiciroh/devcon26:devcon26-inflect
                  image_pull_policy: Always
              devcon2:
                display_name: HydroServer
                slug: devcon2
                kubespawner_override:
                  image: quay.io/awiciroh/devcon26:devcon26-hydroserver
                  image_pull_policy: Always
              devcon3:
                display_name: Hillslope Water Quality Prediction
                slug: devcon3
                kubespawner_override:
                  image: quay.io/awiciroh/devcon26:devcon26-hillslope
                  image_pull_policy: Always
              devcon4:
                display_name: ML Emulator Models
                slug: devcon4
                kubespawner_override:
                  image: quay.io/awiciroh/devcon26:devcon26-emulator
                  image_pull_policy: Always
              devcon5:
                display_name: Satellite Data Projection
                slug: devcon5
                kubespawner_override:
                  image: quay.io/awiciroh/devcon26:devcon26-satellite
                  image_pull_policy: Always
              devcon6:
                display_name: CUAHSI Hydroinformatics
                slug: devcon6
                kubespawner_override:
                  image: quay.io/awiciroh/devcon26:devcon26-cuahsi
                  image_pull_policy: Always
              devcon9:
                display_name: Foundations of ML
                slug: devcon9
                kubespawner_override:
                  image: quay.io/awiciroh/devcon26:devcon26-foundations
                  image_pull_policy: Always
        kubespawner_override:
          mem_guarantee: 15287443456
          mem_limit: 15287443456
          cpu_guarantee: 1.8887049999999999
          cpu_limit: 15.109639999999999
          node_selector:
            node.kubernetes.io/instance-type: n2-highmem-16
      - display_name: Medium
        default: true
        description: ~28 GB RAM, ~4 CPUs. Up to ~15 CPUs when available
        profile_options: *profile_options
        kubespawner_override:
          mem_guarantee: 30574886912
          mem_limit: 30574886912
          cpu_guarantee: 3.7774099999999997
          cpu_limit: 15.109639999999999
          node_selector:
            node.kubernetes.io/instance-type: n2-highmem-16
      - display_name: Large
        description: ~57 GB RAM, ~8 CPUs .Up to ~62 CPUs when available
        profile_options: *profile_options
        kubespawner_override:
          mem_guarantee: 61149773824
          mem_limit: 61149773824
          cpu_guarantee: 7.554819999999999
          cpu_limit: 15.109639999999999
          node_selector:
            node.kubernetes.io/instance-type: n2-highmem-16
      - display_name: Huge
        description: ~114 GB RAM, ~16 CPUs. Up to ~62 CPUs when available
        profile_options: *profile_options
        allowed_groups:
        - huge
        kubespawner_override:
          mem_guarantee: 122299547648
          mem_limit: 122299547648
          cpu_guarantee: 15.109639999999999
          cpu_limit: 15.109639999999999
          node_selector:
            node.kubernetes.io/instance-type: n2-highmem-16
      - display_name: NVIDIA Tesla T4, ~16 GB, ~4 CPUs
        description: Start a container on a dedicated node with a GPU
        allowed_groups:
        - gpu
        profile_options:
          image:
            display_name: Image
            choices:
              tensorflow:
                display_name: Pangeo Tensorflow ML Notebook
                slug: tensorflow
                kubespawner_override:
                  image: pangeo/ml-notebook:2024.05.07
              pytorch:
                display_name: Pangeo PyTorch ML Notebook
                default: true
                slug: pytorch
                kubespawner_override:
                  image: pangeo/pytorch-notebook:2024.05.07
        kubespawner_override:
          environment:
            NVIDIA_DRIVER_CAPABILITIES: compute,utility
          mem_limit:
          mem_guarantee: 14G
          node_selector:
            node.kubernetes.io/instance-type: n1-highmem-8
          extra_resource_limits:
            nvidia.com/gpu: '1'
      extraEnv:
        SCRATCH_BUCKET: gs://awi-ciroh-scratch-workshop/$(JUPYTERHUB_USER)
        PANGEO_SCRATCH: gs://awi-ciroh-scratch-workshop/$(JUPYTERHUB_USER)
    hub:
      allowNamedServers: true
      config:
        JupyterHub:
          authenticator_class: shared-password
        Authenticator:
          manage_groups: false
          allow_all: true
          admin_users:
          - arpita0911patel
          - benlee0423
          - sheargrub
