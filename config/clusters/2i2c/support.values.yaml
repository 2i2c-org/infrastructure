prometheusIngressAuthSecret:
  enabled: false

prometheusStorageClass:
  gke:
    enabled: true

prometheus:
  server:
    # Tune down resources, as there's only 1 hub here now
    resources:
      requests:
        cpu: 0.01
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
    persistentVolume:
      # This *used* to be the source of our shared cluster billing
      # data, so is larger
      size: 512Gi
      storageClass: balanced-rwo-retain
    ingress:
      enabled: true
      hosts:
      - prometheus.pilot.2i2c.cloud
      tls:
      - secretName: prometheus-tls
        hosts:
        - prometheus.pilot.2i2c.cloud

    extraArgs:
      web.config.file: /etc/config/web.yml
grafana:
  grafana.ini:
    server:
      root_url: https://grafana.pilot.2i2c.cloud/
    auth.github:
      enabled: true
      allowed_organizations: 2i2c-org
    feature_toggles:
      enable: exploreMixedDatasource
  ingress:
    hosts:
    - grafana.pilot.2i2c.cloud
    tls:
    - secretName: grafana-tls
      hosts:
      - grafana.pilot.2i2c.cloud
  plugins:
  - grafana-bigquery-datasource

nginx-ingress:
  enabled: true
  controller:
    ingressClass:
      # Claim the `nginx` ingress class
      create: true

ingress-nginx:
  controller:
    # Turn off this controller
    replicaCount: 0
    # Let go of the `nginx` ingress class
    ingressClassResource:
      enabled: false

clusterEntrypoint:
  targetController: nginx-ingress

