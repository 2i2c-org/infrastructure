prometheusIngressAuthSecret:
  enabled: true

cluster-autoscaler:
  enabled: true
  autoDiscovery:
    clusterName: victor
  awsRegion: us-west-2

grafana:
  grafana.ini:
    server:
      root_url: https://grafana.victor.2i2c.cloud/
    auth.github:
      enabled: true
      allowed_organizations: 2i2c-org
  ingress:
    hosts:
    - grafana.victor.2i2c.cloud
    tls:
    - secretName: grafana-tls
      hosts:
      - grafana.victor.2i2c.cloud

prometheus:
  server:
    ingress:
      enabled: true
      hosts:
      - prometheus.victor.2i2c.cloud
      tls:
      - secretName: prometheus-tls
        hosts:
        - prometheus.victor.2i2c.cloud

nginx-ingress:
  enabled: true
  controller:
    ingressClass:
      # Claim the `nginx` ingress class
      create: true

ingress-nginx:
  controller:
    # Turn off this controller
    replicaCount: 0
    # Let go of the `nginx` ingress class
    ingressClassResource:
      enabled: false

clusterEntrypoint:
  targetController: nginx-ingress

redirects:
  rules:
  - from: victor.2i2c.cloud
    to: hub.victorproject.org
  - from: staging.victor.2i2c.cloud
    to: staging.hub.victorproject.org

calico:
  enabled: true

# FIXME: remove this once eksctl is fixed
nvidiaDevicePlugin:
  aws:
    enabled: true
