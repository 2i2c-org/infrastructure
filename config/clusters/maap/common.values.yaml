nfs:
  enabled: true
  pv:
    enabled: true
    # from https://docs.aws.amazon.com/efs/latest/ug/mounting-fs-nfs-mount-settings.html
dask-gateway:
  enabled: true
  gateway:
    auth:
      type: jupyterhub
      jupyterhub:
        jupyterhubServiceName: dask-gateway

jupyterhub:

  prePuller:
    # Pre-pull all explicitly specified images in our profiles on all nodes
    # when they start up
    continuous:
      enabled: true

    extraImages:
      # Keep up to date with the init container used for pulling in docs, under initContainers
      nbgitpuller:
        name: public.ecr.aws/nasa-veda/jupyterhub-gitpuller-init
        tag: 97eb45f9d23b128aff810e45911857d5cffd05c2
      # Keep up to date with s3fs sidecar
      s3fs:
        name: mas.dit.maap-project.org/root/che-sidecar-s3fs
        tag: 2i2c # This is a mutable tag, so may trigger re-pulls

  custom:
    daskhubSetup:
      enabled: true
    2i2c:
      add_staff_user_ids_to_admin_users: true
      add_staff_user_ids_of_type: github
    homepage:
      templateVars:
        org:
          name: The Multi-Mission Algorithm and Analysis Platform (MAAP)Project
          logo_url: https://maap-project.org/wp-content/uploads/2021/10/nasamaaplogo3.png
          url: https://maap-project.org/
        designed_by:
          name: 2i2c
          url: https://2i2c.org
        operated_by:
          name: 2i2c
          url: https://2i2c.org
        funded_by:
          name: NASA
          url: https://www.earthdata.nasa.gov/esds
  hub:
    allowNamedServers: true
    loadRoles:
      server:
        scopes:
        - self
        - access:services!service=dask-gateway
      user:
        scopes:
        - self
        - access:services!service=dask-gateway
    config:
      JupyterHub:
        authenticator_class: generic-oauth
      Authenticator:
        admin_users:
        - freitagb
        - wildintellect
        authenticator_class: generic-oauth
        enable_auth_state: true
        # Disable for now the authentication token refreshing
        # https://oauthenticator.readthedocs.io/en/latest/reference/api/gen/oauthenticator.oauth2.html#oauthenticator.oauth2.OAuthenticator.auth_refresh_age
        auth_refresh_age: 0
      GenericOAuthenticator:
        # We want to get user data from the JWT that's the id token,
        # not from a separate userdata API call
        userdata_from_id_token: true
        scope:
        - basic
        - profile
        - openid
        username_claim: preferred_username
        manage_groups: true
        auth_state_groups_key: oauth_user.roles
        admin_groups:
        - Admin
        # Being granted *any* jupyterhub related role should allow you
        # to login
        allowed_groups:
        - Admin
        - CPU:XS
        - CPU:S
        - CPU:M
        - CPU:L
        - CPU:XL
        - CPU:XXL
        - CPU:XXXL
        - GPU:T4
    extraConfig:
      001-username-claim: |
        def populate_token(spawner, auth_state):
          # For our deployment-service-check health check user, there is no auth_state.
          if auth_state:
            pgt = f"jwt:{auth_state.get('id_token', '')}"
            
            spawner.environment.update({
              "MAAP_PGT": pgt,
              "KC_ACCESS_TOKEN": auth_state.get("access_token", ""),
              "KC_ID_TOKEN": auth_state.get("id_token", ""),
              "KC_REFRESH_TOKEN": auth_state.get("refresh_token", "")
            })
            
            # Inject MAAP_PGT into the s3fs sidecar container
            for container in spawner.extra_containers:
              if container.get("name") == "s3fs":
                env_list = container.setdefault("env", [])
                env_list.append({
                    "name": "MAAP_PGT",
                    "value": pgt,
                })

        c.Spawner.auth_state_hook = populate_token
      # Post auth API endpoint maintained by the MAAP Platform team
      002-post-auth-webhook: |
        import asyncio
        from tornado.httpclient import AsyncHTTPClient
        from z2jh import get_config

        async def _notify_maap_api(authenticator, base_url, pgt):
            """Fire-and-forget call to MAAP REST API."""
            http_client = AsyncHTTPClient()
            try:
                await http_client.fetch(
                    f"{base_url}/api/members/self",
                    method="GET",
                    headers={"Authorization": f"Bearer {pgt}"},
                    request_timeout=5.0,
                )
            except Exception as e:
                authenticator.log.exception("MAAP post-auth webhook failed: %s", e)

        async def maap_post_auth_hook(authenticator, handler, authentication):
            """Notify MAAP REST API after successful login (non-blocking)."""
            base_url = get_config("custom.maap.apiBaseUrl", "")
            if not base_url:
                return authentication

            auth_state = authentication.get("auth_state", {})
            pgt = f"jwt:{auth_state.get('id_token', '')}"

            asyncio.ensure_future(_notify_maap_api(authenticator, base_url, pgt))

            return authentication

        c.GenericOAuthenticator.post_auth_hook = maap_post_auth_hook
  singleuser:
    extraFiles:
      jupyter_server_config.json:
        data:
          FileContentsManager:
            # Allow deleting full directories
            always_delete_dir: true
    cloudMetadata:
      blockWithIptables: false
    defaultUrl: /lab
    storage:
      extraVolumes:
        01-s3fs-volume:
          name: s3fs-volume
          emptyDir: {}
      extraVolumeMounts:
        01-shared-public-volumemount:
          name: home
          mountPath: /home/jovyan/shared-public
          subPath: _shared-public
          readOnly: false
        02-shared-public-rstudio-volumemount:
          name: home
          mountPath: /home/rstudio/shared-public
          subPath: _shared-public
          readOnly: false
        03-s3fs-private-bucket-volumemount:
          name: s3fs-volume
          mountPath: /home/jovyan/my-private-bucket
          subPath: my-private-bucket
          mountPropagation: HostToContainer
          readOnly: false
        04-s3fs-public-bucket-volumemount:
          name: s3fs-volume
          mountPath: /home/jovyan/my-public-bucket
          subPath: my-public-bucket
          mountPropagation: HostToContainer
          readOnly: false
        05-s3fs-shared-bucket-volumemount:
          name: s3fs-volume
          mountPath: /home/jovyan/shared-buckets
          subPath: shared-buckets
          mountPropagation: HostToContainer
          readOnly: true
        06-s3fs-private-triaged-jobs-volumemount:
          name: s3fs-volume
          mountPath: /home/jovyan/triaged-jobs
          subPath: triaged-jobs
          mountPropagation: HostToContainer
          readOnly: true
        07-s3fs-org-buckets-volumemount:
          name: s3fs-volume
          mountPath: /home/jovyan/my-team-buckets
          subPath: my-team-buckets
          mountPropagation: HostToContainer
          readOnly: false
    initContainers:
    - name: jupyterhub-gitpuller-init
      # Keep this up to date with `prePuller.extraImages`
      image: public.ecr.aws/nasa-veda/jupyterhub-gitpuller-init:97eb45f9d23b128aff810e45911857d5cffd05c2
      env:
      - name: TARGET_PATH
        value: veda-docs
      - name: SOURCE_REPO
        value: https://github.com/NASA-IMPACT/veda-docs
      volumeMounts:
      - name: home
        mountPath: /home/jovyan
        subPath: '{escaped_username}'
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
    extraContainers:
    - name: s3fs
      image: mas.dit.maap-project.org/root/che-sidecar-s3fs:2i2c
      imagePullPolicy: Always
      securityContext:
        privileged: true
      resources:
        limits:
          memory: 512Mi
          cpu: 1.0
        requests:
          # If we don't set requests, k8s sets requests == limits!
          # So we set something tiny
          memory: 64Mi
          cpu: 0.01
      volumeMounts:
      - name: s3fs-volume
        mountPath: /my-public-bucket
        subPath: my-public-bucket
        mountPropagation: Bidirectional
      - name: s3fs-volume
        mountPath: /my-private-bucket
        subPath: my-private-bucket
        mountPropagation: Bidirectional
      - name: s3fs-volume
        mountPath: /shared-buckets
        subPath: shared-buckets
        mountPropagation: Bidirectional
      - name: s3fs-volume
        mountPath: /triaged-jobs
        subPath: triaged-jobs
        mountPropagation: Bidirectional
      - name: s3fs-volume
        mountPath: /my-team-buckets
        subPath: my-team-buckets
        mountPropagation: Bidirectional

  scheduling:
    userScheduler:
      enabled: true

binderhub-service:
  enabled: true
  networkPolicy:
    enabled: true
  # Explicitly specify what nodes we want for our builds
  # Otherwise we may scale up a larger node than needed
  config:
    DockerRegistry:
      url: &url https://quay.io
      username: &username imagebuilding-non-gcp-hubs+image_builder
  buildPodsRegistryCredentials:
    server: *url
    username: *username
