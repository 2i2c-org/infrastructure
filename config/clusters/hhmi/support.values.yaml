prometheus:
  server:
    resources:
      requests:
        memory: 512Mi
      limits:
        memory: 1Gi

    ingress:
      enabled: true
      hosts:
      - prometheus.hhmi.2i2c.cloud
      tls:
      - secretName: prometheus-tls
        hosts:
        - prometheus.hhmi.2i2c.cloud

grafana:
  grafana.ini:
    server:
      root_url: https://grafana.hhmi.2i2c.cloud/
  auth.github:
    enabled: true
    allowed_organizations: 2i2c-org
  ingress:
    hosts:
    - grafana.hhmi.2i2c.cloud
    tls:
    - secretName: grafana-tls
      hosts:
      - grafana.hhmi.2i2c.cloud

nginx-ingress:
  enabled: true
  controller:
    ingressClass:
      # Claim the `nginx` ingress class
      create: true

clusterEntrypoint:
  targetController: nginx-ingress
