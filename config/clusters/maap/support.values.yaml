disableCoredumps:
  enabled: true

prometheus:
  server:
    ingress:
      enabled: true
      hosts:
      - prometheus.maap.2i2c.cloud
      tls:
      - secretName: prometheus-tls
        hosts:
        - prometheus.maap.2i2c.cloud

grafana:
  grafana.ini:
    server:
      root_url: https://grafana.maap.2i2c.cloud/
  auth.github:
    enabled: true
    allowed_organizations: 2i2c-org
  ingress:
    hosts:
    - grafana.maap.2i2c.cloud
    tls:
    - secretName: grafana-tls
      hosts:
      - grafana.maap.2i2c.cloud

cluster-autoscaler:
  enabled: true
  autoDiscovery:
    clusterName: maap
  awsRegion: us-west-2

calico:
  enabled: true

redirects:
  rules:
  - from: staging.hub.maap.2i2c.cloud
    to: staging.hub.maap-project.org
  - from: hub.maap.2i2c.cloud
    to: hub.maap-project.org

# FIXME: remove this once eksctl is fixed
nvidiaDevicePlugin:
  aws:
    enabled: true

nginx-ingress:
  enabled: true
  controller:
    ingressClass:
      # Claim the `nginx` ingress class
      create: true

ingress-nginx:
  controller:
    # Turn off this controller
    replicaCount: 0
    # Let go of the `nginx` ingress class
    ingressClassResource:
      enabled: false

clusterEntrypoint:
  targetController: nginx-ingress
