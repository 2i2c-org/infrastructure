prometheus:
  server:
    persistentVolume:
      size: 600Gi
    ingress:
      enabled: true
      hosts:
      - prometheus.utoronto.2i2c.cloud
      tls:
      - secretName: prometheus-tls
        hosts:
        - prometheus.utoronto.2i2c.cloud
    resources:
      # utoronto's prometheus seems to lie stable below 10Gi at around 6Gi
      requests:
        memory: 12Gi
      limits:
        memory: 12Gi

grafana:
  grafana.ini:
    server:
      root_url: https://grafana.utoronto.2i2c.cloud/
    auth.github:
      enabled: true
      allowed_organizations: 2i2c-org
  ingress:
    hosts:
    - grafana.utoronto.2i2c.cloud
    tls:
    - secretName: grafana-tls
      hosts:
      - grafana.utoronto.2i2c.cloud

clusterEntrypoint:
  targetController: nginx-ingress

nginx-ingress:
  # Enable controller
  enabled: true
  controller:
    ingressClass:
      # Claim the `nginx` ingress class
      create: true
    service:
      annotations:
        # This annotation is a requirement for use in Azure provided
        # LoadBalancer - see https://learn.microsoft.com/en-us/azure/aks/ingress-basic?tabs=azure-cli#basic-configuration
        service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
