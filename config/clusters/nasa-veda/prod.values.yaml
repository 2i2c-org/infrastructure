basehub:
  nfs:
    pv:
      serverIP: 10.100.32.135
  jupyterhub:
    hub:
      extraFiles:
        usage_quotas_config:
          mountPath: /usr/local/etc/jupyterhub/jupyterhub_config.d/jupyterhub_usage_quotas_config.py
          stringData: |
            c.UsageConfig.prometheus_url = "http://support-prometheus-server.support.svc.cluster.local"
            c.UsageConfig.hub_namespace = "prod"
            c.UsageViewer.public_hub_url = "https://hub.openveda.cloud/"
            c.UsageViewer.enable_compute = False
    custom:
      homepage:
        gitRepoBranch: master
        gitRepoUrl: https://github.com/NASA-IMPACT/veda-hub-homepage
  binderhub-service:
    config:
      BinderHub:
        image_prefix: quay.io/imagebuilding-non-gcp-hubs/veda-prod-
    extraEnv:
    - name: JUPYTERHUB_API_URL
      value: https://hub.openveda.cloud/hub/api

  jupyterhub-home-nfs:
    eks:
      volumeId: vol-0063ecd342e052ef5
    quotaEnforcer:
      config:
        QuotaManager:
          # Community-requested value
          hard_quota: 200 # in GiB
