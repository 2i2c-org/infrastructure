basehub:
  nfs:
    enabled: true
    pv:
      enabled: true
  dask-gateway:
    enabled: true
    gateway:
      auth:
        type: jupyterhub
        jupyterhub:
          jupyterhubServiceName: dask-gateway
      backend:
        scheduler:
          cores:
            request: 1
            limit: 2
          memory:
            request: 4G
            limit: 4G
  jupyterhub:
    custom:
      daskhubSetup:
        enabled: true
      # Extra mount point for admins to access to all users' home dirs
      # Ref https://github.com/2i2c-org/infrastructure/issues/2105
      singleuserAdmin:
        extraVolumeMounts:
          01-allusers-volumemount:
            name: home
            mountPath: /home/jovyan/allusers
      2i2c:
        add_staff_user_ids_to_admin_users: true
        add_staff_user_ids_of_type: github
      homepage:
        templateVars:
          org:
            name: LEAP
            url: https://leap-stc.github.io
            logo_url: https://raw.githubusercontent.com/leap-stc/leap-stc.github.io/refs/heads/main/docs/assets/NSF_LEAP_joint_logo.svg
          designed_by:
            name: 2i2c
            url: https://2i2c.org
          operated_by:
            name: 2i2c
            url: https://2i2c.org
          funded_by:
            name: LEAP
            url: https://leap-stc.github.io
    hub:
      annotations:
        # Prevents the core node on which this pod is present from being drained
        # See https://github.com/2i2c-org/infrastructure/issues/3461
        cluster-autoscaler.kubernetes.io/safe-to-evict: 'false'
      allowNamedServers: true
      loadRoles:
        server:
          scopes:
          - self
          - access:services!service=dask-gateway
        user:
          scopes:
          - self
          - access:services!service=dask-gateway
          - access:services!service=binder
      config:
        JupyterHub:
          authenticator_class: github
        GitHubOAuthenticator:
          allowed_organizations:
          - 2i2c-org:hub-access-for-2i2c-staff
          - leap-stc:leap-pangeo-base-access
          - leap-stc:leap-pangeo-full-access
          - leap-stc:data-and-compute
          - leap-stc:climatematch_shared_group
        Authenticator:
          admin_users:
          - RobertPincus
          - SammyAgrawal
          - sarika-debruyn
          - ilu24
      extraConfig:
        000-volumes-and-volume-mounts-as-dict: |
          # The base jupyterhub config in zero-to-jupyterhub defines
          # volumes and volume_mounts as lists.
          # But we can't add new volumes or volume_mounts to the list
          # as that replaces the entire list.
          # So we convert them to dictionaries, which allows us to
          # add new volumes and volume_mounts as needed.
          if isinstance(c.KubeSpawner.volumes, list):
            existing_volumes = c.KubeSpawner.volumes
            c.KubeSpawner.volumes = {}
            for volume in existing_volumes:
              c.KubeSpawner.volumes[volume["name"]] = volume
          if isinstance(c.KubeSpawner.volume_mounts, list):
            existing_volume_mounts = c.KubeSpawner.volume_mounts
            c.KubeSpawner.volume_mounts = {}
            for idx, volume_mount in enumerate(existing_volume_mounts):
              c.KubeSpawner.volume_mounts[f"{idx}-{volume_mount['name']}"] = volume_mount
        001-group-shared-directories: |
          c.KubeSpawner.group_overrides = {
            "00-group-hub-access-for-climatematch-shared-group": {
              "groups": ["leap-stc:climatematch_shared_group"],
              "spawner_override": {
                "volume_mounts": {
                  "00-group-hub-access-for-climatematch-shared-group": {
                    "name": "home",
                    "mountPath": "/home/jovyan/shared-group",
                    "subPath": "_shared-group",
                    "readOnly": False
                  },
                }
              },
            },
          }
    singleuser:
      cloudMetadata:
        blockWithIptables: false
      extraEnv:
        GH_SCOPED_CREDS_CLIENT_ID: Iv1.0c7df3d4b3191b2f
        GH_SCOPED_CREDS_APP_URL: https://github.com/apps/leap-hub-push-access
      profileList:
        # NOTE: This is not a standard node sharing setup, don't copy it!
        #
        #       LEAP has explicitly requested the following adjustments from the
        #       standardized "medium" instance.
        #       - The standardized "medium" instance is declared twice, once for
        #         a github team with base access, and once for a github team with
        #         full access.
        #       - Limits for CPU and Memory are set to match the node share
        #         description. Expected consequences of this is: significant CPU
        #         under-utilization, OOMKilled processes when limit is reached, no
        #         pod evictions due to node memory pressure.
      - display_name: Devs Only
        description: Start a container limited to a chosen share of capacity on a node of this type
        allowed_groups:
        - 2i2c-org:hub-access-for-2i2c-staff
        - leap-stc:leap-pangeo-dev-access
        - leap-stc:data-and-compute
        profile_options:
          requests:
              # NOTE: Node share choices are in active development, see comment
              #       next to profileList: above.
              #
              #       This specific setup is not a standard node sharing setup,
              #       don't copy it!
              #
            display_name: Node share
            choices:
              mem_512:
                display_name: ~512 GB, ~64.0 CPU
                kubespawner_override:
                  mem_guarantee: 462.196G
                  cpu_guarantee: 46.4
                  mem_limit: 512G
                  cpu_limit: 64
          image: &profile_list_profile_options_image
            display_name: Image
            unlisted_choice: &profile_list_unlisted_choice
              enabled: true
              display_name: Custom image
              validation_regex: ^.+:.+$
              validation_message: Must be a publicly available docker image, of form <image-name>:<tag>
              kubespawner_override:
                image: '{value}'
            choices:
              pangeo:
                display_name: Base Pangeo Notebook (2025.11.13)
                default: true
                slug: pangeo
                kubespawner_override:
                  image: pangeo/pangeo-notebook:2025.11.13
              tensorflow:
                display_name: Pangeo Tensorflow ML Notebook (2025.11.13)
                slug: tensorflow
                kubespawner_override:
                  image: pangeo/ml-notebook:2025.11.13
              pytorch:
                display_name: Pangeo PyTorch ML Notebook (2025.11.13)
                slug: pytorch
                kubespawner_override:
                  image: pangeo/pytorch-notebook:2025.11.13
              leap-pangeo-edu:
                display_name: LEAP Education Notebook (Testing Prototype)
                slug: leap_edu
                kubespawner_override:
                  image: quay.io/2i2c/leap-edu-image:278370f204a2
        kubespawner_override:
          cpu_limit:
          mem_limit:
          node_selector:
            node.kubernetes.io/instance-type: n2-highmem-64

      - display_name: CPU only
        description: &profile_list_description Start a container limited to a chosen share of capacity on a node of this type
        slug: medium-full
        default: true
        allowed_groups:
        - 2i2c-org:hub-access-for-2i2c-staff
        - leap-stc:leap-pangeo-full-access
        - leap-stc:data-and-compute
        profile_options:
          requests:
              #       This specific setup is not a standard node sharing setup,
              #       don't copy it!
              #
            display_name: Node share
            choices:
              mem_8: &medium_mem_8
                display_name: ~8 GB, ~1.0 CPU
                default: true
                kubespawner_override:
                  mem_guarantee: 7.222G
                  cpu_guarantee: 0.1
                  mem_limit: 8G
                  cpu_limit: 1
              mem_16: &medium_mem_16
                display_name: ~16 GB, ~2.0 CPU
                kubespawner_override:
                  mem_guarantee: 14.444G
                  cpu_guarantee: 0.2
                  mem_limit: 16G
                  cpu_limit: 2
              mem_32: &medium_mem_32
                display_name: ~32 GB, ~4.0 CPU
                kubespawner_override:
                  mem_guarantee: 28.887G
                  cpu_guarantee: 0.4
                  mem_limit: 32G
                  cpu_limit: 4
              mem_64:
                display_name: ~64 GB, ~8.0 CPU
                kubespawner_override:
                  mem_guarantee: 57.775G
                  cpu_guarantee: 0.8
                  mem_limit: 64G
                  cpu_limit: 8
              mem_128:
                display_name: ~128 GB, ~16.0 CPU
                kubespawner_override:
                  mem_guarantee: 115.549G
                  cpu_guarantee: 1.6
                  mem_limit: 128G
                  cpu_limit: 16
          image:
            display_name: Image
            dynamic_image_building:
              enabled: true
            unlisted_choice:
              enabled: true
              display_name: Custom image
              validation_regex: ^.+:.+$
              validation_message: Must be a publicly available docker image, of form <image-name>:<tag>
              kubespawner_override:
                image: '{value}'
            choices:
              pangeo:
                display_name: Base Pangeo Notebook (2025.11.13)
                default: true
                slug: pangeo
                kubespawner_override:
                  image: pangeo/pangeo-notebook:2025.11.13
              tensorflow:
                display_name: Pangeo Tensorflow ML Notebook (2025.11.13)
                slug: tensorflow
                kubespawner_override:
                  image: pangeo/ml-notebook:2025.11.13
              pytorch:
                display_name: Pangeo PyTorch ML Notebook (2025.11.13)
                slug: pytorch
                kubespawner_override:
                  image: pangeo/pytorch-notebook:2025.11.13
              leap-pangeo-edu:
                display_name: LEAP Education Notebook (Testing Prototype)
                slug: leap_edu
                kubespawner_override:
                  image: quay.io/2i2c/leap-edu-image:278370f204a2
        kubespawner_override: &medium_kubespawner_override
          cpu_limit:
          mem_limit:
          node_selector:
            node.kubernetes.io/instance-type: n2-highmem-16

        # NOTE: This is the second medium profile list entry, with less node
        #       share options for a different subset of users via the basehub
        #       specific allowed_groups configuration.
        #
      - display_name: CPU only
        description: *profile_list_description
        slug: medium-base
        allowed_groups:
        - leap-stc:leap-pangeo-base-access
        profile_options:
          requests:
              #       This specific setup is not a standard node sharing setup,
              #       don't copy it!
              #
            display_name: Node share
            choices:
              mem_8: *medium_mem_8
              mem_16: *medium_mem_16
              mem_32: *medium_mem_32
          image: *profile_list_profile_options_image
        kubespawner_override: *medium_kubespawner_override

      - display_name: GPU
        slug: gpu
        description: Start a container on a node with a single GPU available.
        allowed_groups:
        - 2i2c-org:hub-access-for-2i2c-staff
        - leap-stc:leap-pangeo-full-access
        - leap-stc:data-and-compute
        profile_options:
          requests:
            display_name: GPU type
            choices:
              tesla_t4:
                display_name: NVIDIA Tesla T4 [16GB VRAM], ~30GB RAM, 8 CPUs
                default: true
                kubespawner_override:
                  node_selector:
                    node.kubernetes.io/instance-type: n1-standard-8
                    cloud.google.com/gke-accelerator: nvidia-tesla-t4
                  environment:
                    NVIDIA_DRIVER_CAPABILITIES: compute,utility
                  mem_guarantee: 25G
                  mem_limit: 29G
                  extra_resource_limits:
                    nvidia.com/gpu: '1'

              nvidia_l4:
                allowed_groups:
                - 2i2c-org:hub-access-for-2i2c-staff
                - leap-stc:large-gpu
                display_name: NVIDIA L4 [24GB VRAM], ~16GB RAM, 4 CPUs
                kubespawner_override:
                  node_selector:
                    node.kubernetes.io/instance-type: g2-standard-4
                    cloud.google.com/gke-accelerator: nvidia-l4
                  environment:
                    NVIDIA_DRIVER_CAPABILITIES: compute,utility
                  mem_guarantee: 10G
                  mem_limit: 15G
                  extra_resource_limits:
                    nvidia.com/gpu: '1'

              nvidia_a100:
                allowed_groups:
                - 2i2c-org:hub-access-for-2i2c-staff
                - leap-stc:large-gpu
                display_name: NVIDIA A100 [40GB VRAM], ~85GB RAM, 12 CPUs
                kubespawner_override:
                  node_selector:
                    node.kubernetes.io/instance-type: a2-highgpu-1g
                    cloud.google.com/gke-accelerator: nvidia-tesla-a100
                  environment:
                    NVIDIA_DRIVER_CAPABILITIES: compute,utility
                  mem_guarantee: 70G
                  mem_limit: 82G
                  extra_resource_limits:
                    nvidia.com/gpu: '1'

          image:
            display_name: Image
            unlisted_choice: *profile_list_unlisted_choice
            choices:
              tensorflow:
                display_name: Pangeo Tensorflow ML Notebook (2025.11.13)
                slug: tensorflow
                kubespawner_override:
                  image: pangeo/ml-notebook:2025.11.13
              pytorch:
                display_name: Pangeo PyTorch ML Notebook (2025.11.13)
                slug: pytorch
                kubespawner_override:
                  image: pangeo/pytorch-notebook:2025.11.13
  binderhub-service:
    enabled: true
    config:
      BinderHub:
        image_prefix: us-central1-docker.pkg.dev/leap-pangeo/imagebuilding-registry/
    buildPodsRegistryCredentials:
      server: https://us-central1-docker.pkg.dev
      username: _json_key
