basehub:
  jupyterhub:
    custom:
      homepage:
        gitRepoBranch: staging
        gitRepoUrl: https://github.com/US-GHG-Center/ghgc-hub-homepage
    hub:
      extraFiles:
        usage_quotas_config:
          mountPath: /usr/local/etc/jupyterhub/jupyterhub_config.d/jupyterhub_usage_quotas_config.py
          stringData: |
            c.UsageConfig.prometheus_url = "http://support-prometheus-server.support.svc.cluster.local"
            c.UsageConfig.hub_namespace = "staging"
            c.UsageViewer.public_hub_url = "https://staging.ghg.2i2c.cloud/"
            c.UsageViewer.enable_compute = False
  binderhub-service:
    config:
      BinderHub:
        image_prefix: quay.io/imagebuilding-non-gcp-hubs/nasa-ghg-staging-
    extraEnv:
    - name: JUPYTERHUB_API_URL
      value: https://staging.ghg.2i2c.cloud/hub/api

  jupyterhub-home-nfs:
    eks:
      volumeId: vol-01889854859d8768d

  nfs:
    pv:
      serverIP: 10.100.155.30
