prometheusIngressAuthSecret:
  enabled: true

prometheus:
  server:
    persistentVolume:
      size: 100Gi
    ingress:
      enabled: true
      hosts:
      - prometheus.berkeley-geojupyter.2i2c.cloud
      tls:
      - secretName: prometheus-tls
        hosts:
        - prometheus.berkeley-geojupyter.2i2c.cloud

grafana:
  grafana.ini:
    server:
      root_url: https://grafana.berkeley-geojupyter.2i2c.cloud/
  auth.github:
    enabled: true
    allowed_organizations: 2i2c-org
  ingress:
    hosts:
    - grafana.berkeley-geojupyter.2i2c.cloud
    tls:
    - secretName: grafana-tls
      hosts:
      - grafana.berkeley-geojupyter.2i2c.cloud

nginx-ingress:
  enabled: true
  controller:
    ingressClass:
      # Claim the `nginx` ingress class
      create: true

ingress-nginx:
  controller:
    # Turn off this controller
    replicaCount: 0
    # Let go of the `nginx` ingress class
    ingressClassResource:
      enabled: false

clusterEntrypoint:
  targetController: nginx-ingress

cluster-autoscaler:
  enabled: true
  autoDiscovery:
    clusterName: berkeley-geojupyter
  awsRegion: us-west-2

calico:
  enabled: true
