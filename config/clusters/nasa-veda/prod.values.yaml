basehub:
  nfs:
    pv:
      serverIP: 10.100.32.135
  jupyterhub:
    ingress:
      hosts: [hub.openveda.cloud]
      tls:
      - hosts: [hub.openveda.cloud]
        secretName: https-auto-tls
    custom:
      homepage:
        gitRepoBranch: master
        gitRepoUrl: https://github.com/NASA-IMPACT/veda-hub-homepage
    singleuser:
      nodeSelector:
        2i2c/hub-name: prod
    hub:
      image:
        # Temporary image with jupyterhub-fancy-profiles 0.6.0
        tag: 0.0.1-0.dev.git.15540.hbaaa997ce
  dask-gateway:
    gateway:
      backend:
        scheduler:
          extraPodConfig:
            nodeSelector:
              2i2c/hub-name: prod
        worker:
          extraPodConfig:
            nodeSelector:
              2i2c/hub-name: prod

  binderhub-service:
    dockerApi:
      nodeSelector:
        2i2c/hub-name: prod
    config:
      KubernetesBuildExecutor:
        node_selector:
          2i2c/hub-name: prod
      BinderHub:
        image_prefix: quay.io/imagebuilding-non-gcp-hubs/veda-prod-

  jupyterhub-home-nfs:
    eks:
      volumeId: vol-0063ecd342e052ef5
    quotaEnforcer:
      config:
        QuotaManager:
          # Community-requested value
          hard_quota: 200 # in GiB
