nfs:
  pv:
    serverIP: 10.100.17.202
jupyterhub-home-nfs:
  eks:
    volumeId: vol-039e18f9304722450

jupyterhub:
  custom:
    homepage:
      templateVars:
        org:
          name: projectpythia staging

  singleuser:
    extraFiles:
      02-menus:
        mountPath: /srv/conda/envs/notebook/share/jupyter/lab/settings/overrides.json

        data:
          '@jupyterlab/mainmenu-extension:plugin':
            menus:
            - id: jp-mainmenu-help
              rank: 1001
              items:
              - command: help:open
                rank: 1001
                args:
                  url: https://github.com/settings/connections/applications/Ov23liD6D2SAPk4ctcyU
                  text: Revoke GitHub Token
                  newBrowserTab: true
binderhub-service:
  extraEnv:
  - name: JUPYTERHUB_API_URL
    value: http://hub.staging.svc.cluster.local:8081/hub/api
