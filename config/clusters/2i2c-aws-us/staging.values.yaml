nfs:
  enabled: true
  pv:
    enabled: true
    serverIP: 10.100.169.190

jupyterhub-home-nfs:
  eks:
    volumeId: vol-063f53806dd18c4a6
  quotaEnforcer:
    config:
      QuotaManager:
        hard_quota: 10 # in GiB
jupyterhub:
  scheduling:
    userScheduler:
      enabled: true
  hub:
    config:
      JupyterHub:
        authenticator_class: github
    services:
      jupyterbook-pub:
        # Auth
        # api_token: <see secret>
        oauth_client_id: service-jupyterbook-pub
        oauth_no_confirm: true
        url: http://jupyterbook-pub-service
  custom:
    2i2c:
      add_staff_user_ids_to_admin_users: true
      add_staff_user_ids_of_type: github
    homepage:
      templateVars:
        org:
          name: 2i2c AWS Staging
          url: https://2i2c.org
          logo_url: https://2i2c.org/media/logo.png
        designed_by:
          name: 2i2c
          url: https://2i2c.org
        operated_by:
          name: 2i2c
          url: https://2i2c.org
        funded_by:
          name: 2i2c
          url: https://2i2c.org
  singleuser:
    extraEnv:
      SCRATCH_BUCKET: s3://2i2c-aws-us-scratch-staging/$(JUPYTERHUB_USER)

jupyterbook-pub-service:
  enabled: true

    # Run the core service on the core nodes
  nodeSelector: &nodeSelector
    hub.jupyter.org/node-purpose: core

  config:
    JupyterBookPubApp:
      base_url: /services/jupyterbook-pub/
      site_subheading: |
        Instantly render pre-built JupyterBook AST!
    KubernetesExecutor:
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 500Mi
      node_selector: *nodeSelector

  extraBuildConfig:
    name: builder_config.json
    json:
      JupyterBook2Builder:
        allow_source_builds: false

  volumeClaim:
    enabled: false

  volume:
    hostPath:
      path: /var/cache/jupyterbook-pub/
      type: DirectoryOrCreate

  auth:
    enabled: true
    # hub_api_token: <set via deploy>
    hub_api_url: https://staging.aws.2i2c.cloud/hub/api/
