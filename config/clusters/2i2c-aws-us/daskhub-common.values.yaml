basehub:
  nfs:
    enabled: true
    pv:
      enabled: true
      # from https://docs.aws.amazon.com/efs/latest/ug/mounting-fs-nfs-mount-settings.html
  dask-gateway:
    enabled: true

  jupyterhub:
    scheduling:
      userScheduler:
        enabled: true
    custom:
      daskhubSetup:
        enabled: true
    singleuser:
      cloudMetadata:
        blockWithIptables: false
    hub:
      config:
        JupyterHub:
          authenticator_class: github
