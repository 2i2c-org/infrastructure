config:
  JupyterBookPubApp:
    base_url: /services/jupyterbook-pub/
  KubernetesExecutor:
    # Current JS2 certs are not X509 valid
    disable_strict_ssl_verification: true

extraBuilderConfig:
  name: builder_config.json
  json:
    JupyterBook2Builder:
      allow_source_builds: false

auth:
  enabled: false
