basehub:
  nfs:
    pv:
      serverIP: 10.100.102.109
  jupyterhub:
    ingress:
      hosts: [hub.cryointhecloud.com]
      tls:
      - hosts: [hub.cryointhecloud.com]
        secretName: https-auto-tls
    singleuser:
      extraEnv:
        SCRATCH_BUCKET: s3://nasa-cryo-scratch/$(JUPYTERHUB_USER)
        PANGEO_SCRATCH: s3://nasa-cryo-scratch/$(JUPYTERHUB_USER)
        PERSISTENT_BUCKET: s3://nasa-cryo-persistent/$(JUPYTERHUB_USER)
  dask-gateway:
    gateway:
      backend:
        scheduler:
          extraPodConfig:
            nodeSelector:
              2i2c/hub-name: prod
        worker:
          extraPodConfig:
            nodeSelector:
              2i2c/hub-name: prod
  jupyterhub-home-nfs:
    eks:
      volumeId: vol-00b9cf4a258bce8ef
    quotaEnforcer:
      config:
        QuotaManager:
          hard_quota: 35 # in GiB
  binderhub-service:
    dockerApi:
      nodeSelector:
        2i2c/hub-name: prod
    config:
      KubernetesBuildExecutor:
        node_selector:
          2i2c/hub-name: prod
      BinderHub:
        image_prefix: quay.io/imagebuilding-non-gcp-hubs/nasa-cryo-prod-
