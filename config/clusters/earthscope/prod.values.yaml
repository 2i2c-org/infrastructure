basehub:
  jupyterhub:
    custom:
      homepage:
        templateVars:
          redirect_to: https://www.earthscope.org/data/geolab/
    hub:
      config:
        GenericOAuthenticator:
          token_url: https://login.earthscope.org/oauth/token
          authorize_url: https://login.earthscope.org/authorize
          userdata_url: https://login.earthscope.org/userinfo
          logout_redirect_url: https://login.earthscope.org/v2/logout?client_id=2PbhUTbRU6e7uIaaEZIShotx15MbvsJJ
          extra_authorize_params:
            # This isn't an actual URL, just a string. Must not have a trailing slash
            audience: https://api.earthscope.org
      extraFiles:
        usage_quotas_config:
          mountPath: /usr/local/etc/jupyterhub/jupyterhub_config.d/jupyterhub_usage_quotas_config.py
          stringData: |
            import os
            c.UsageConfig.prometheus_url = "http://support-prometheus-server.support.svc.cluster.local"
            c.UsageConfig.hub_namespace = "prod"
            c.UsageQuotaManager.metrics_exporter_token = os.environ.get("METRICS_EXPORTER_TOKEN")
    singleuser:
      extraEnv:
        SCRATCH_BUCKET: s3://earthscope-scratch/$(JUPYTERHUB_USER)
  jupyterhub-home-nfs:
    quotaEnforcer:
      config:
        QuotaManager:
          # Requested by community
          hard_quota: 100 # in GiB
    eks:
      volumeId: vol-06f3c3dc2ded0cd06
  nfs:
    pv:
      serverIP: 10.100.106.116
