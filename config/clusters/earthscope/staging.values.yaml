basehub:
  jupyterhub:
    custom:
      homepage:
        templateVars:
          # To login to earthscope staging, now use https://staging.geolab.earthscope.cloud/hub/oauth_login
          redirect_to: https://www.earthscope.org/data/geolab/
    debug:
      enabled: true
    hub:
      image:
        name: quay.io/2i2c/jupyterhub-usage-quotas
        tag: bfdbe0bee333610ff2163455e5da36eea9f5d893
      config:
        GenericOAuthenticator:
          token_url: https://login-dev.earthscope.org/oauth/token
          authorize_url: https://login-dev.earthscope.org/authorize
          userdata_url: https://login-dev.earthscope.org/userinfo
          logout_redirect_url: https://login-dev.earthscope.org/v2/logout?client_id=Kn6kSKtw9TqgrSrEmDS0rlBM7Sc69BkL
          extra_authorize_params:
            # This isn't an actual URL, just a string. Must not have a trailing slash
            audience: https://api.dev.earthscope.org
        UsageConfig:
          prometheus_url: http://support-prometheus-server.support.svc.cluster.local
          hub_namespace: staging
        UsageQuotaManager:
          scope_backup_strategy:
            empty:
              resource: memory
              limit:
                value: 25
                unit: GiB-hours
              window: 7
            intersection: max
          policy:
          - resource: memory
            limit:
              value: 500
              unit: GiB-hours
            window: 1
            scope:
              group:
              - geolab
          - resource: memory
            limit:
              value: 1000
              unit: GiB-hours
            window: 7
            scope:
              group:
              - geolab:dev
          failover_open: true
      extraConfig:
        11-setup-usage-quotas: |
          from jupyterhub_usage_quotas import setup_usage_quotas
          setup_usage_quotas(c)
      services:
        usage-quota:
          url: http://hub:9000
          display: false
          oauth_no_confirm: true
          command:
          - python
          - -m
          - jupyterhub_usage_quotas.services.usage_viewer
          - --config-files=/usr/local/etc/jupyterhub/jupyterhub_config.py
          - --config-files=/usr/local/etc/jupyterhub/jupyterhub_usage_quotas_config.py
      loadRoles:
        usage-quota-service:
          scopes:
          - read:users
          services:
          - usage-quota
        user:
          scopes:
          - self
          - access:services!service=usage-quota
          - access:services!service=dask-gateway
        server:
          scopes:
          - self
          - access:services!service=dask-gateway
      service:
        extraPorts:
        - port: 9000
          targetPort: 9000
          name: usage-quota
      networkPolicy:
        ingress:
        - ports:
          - port: 9000
          from:
          # Allow traffic from the hub pod itself for Jupyterhub's internal healthchecks
          # for hub managed services.
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: hub
                app.kubernetes.io/name: jupyterhub
          # Allow traffic from the proxy api pod
          - podSelector:
              matchLabels:
                hub.jupyter.org/network-access-hub: 'true'
        - ports:
          - port: 8081
          from:
          # Allow traffic from the hub pod itself for oauth calls from the usage-quota service to the hub api.
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: hub
                app.kubernetes.io/name: jupyterhub
    singleuser:
      extraEnv:
        SCRATCH_BUCKET: s3://earthscope-scratch-staging/$(JUPYTERHUB_USER)
    proxy:
      chp:
        networkPolicy:
          egress:
          - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: jupyterhub
                  app.kubernetes.io/component: hub
            ports:
            - port: 9000
  dask-gateway:
    gateway:
      auth:
        type: jupyterhub
        jupyterhub:
          jupyterhubServiceName: dask-gateway
  jupyterhub-home-nfs:
    eks:
      volumeId: vol-0eb31cae0bd3ee261

  nfs:
    pv:
      serverIP: 10.100.35.0
