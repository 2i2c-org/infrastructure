nfs:
  enabled: true
  pv:
    enabled: true
    serverIP: 10.100.67.209
jupyterhub-home-nfs:
  eks:
    volumeId: vol-0304a8a5924616729
  quotaEnforcer:
    config:
      QuotaManager:
        hard_quota: 20 # in GiB
jupyterhub:
  scheduling:
    userScheduler:
      enabled: true
  custom:
    daskhubSetup:
      enabled: true
    2i2c:
      add_staff_user_ids_to_admin_users: true
      add_staff_user_ids_of_type: cilogon
    homepage:
      templateVars:
        org:
          name: 2i2c ORCID Demo
          url: https://2i2c.org
          logo_url: https://2i2c.org/media/logo.png
        designed_by:
          name: 2i2c
          url: https://2i2c.org
        operated_by:
          name: 2i2c
          url: https://2i2c.org
        funded_by:
          name: 2i2c
          url: https://2i2c.org
  hub:
    allowNamedServers: true
    extraConfig:
      01-orcid: |
        from oauthenticator.cilogon import CILogonOAuthenticator

        class ORCIDCILogonAuthenticator(CILogonOAuthenticator):
          def user_info_to_username(self, user_info):
            """
            Fish ORCID username from inside cilogon_user when used with ORCID

            There is no clear way to get just the ORCID id from CILogon, so we
            have to do this. https://github.com/jupyterhub/oauthenticator/issues/712
            is the upstream report, we can get rid of this once that gets fixed.
            """
            print(user_info)
            idp = user_info['idp']
            if idp == 'http://orcid.org/oauth/authorize':
              # Only modify usernames if orcid is used
              # oidc is of the form https://orcid.org/<orcid-id>
              return user_info['oidc'].split('/')[-1]
            return super().user_info_to_username(user_info)

        c.JupyterHub.authenticator_class = ORCIDCILogonAuthenticator
    config:
      JupyterHub:
        authenticator_class: cilogon
      Authenticator:
        admin_users:
        - 0000-0002-8055-2870 # yuvipanda
        - 0000-0002-2391-0678 # Chris Holdgraf
        - 0009-0009-7131-4131 # April
        - 0000-0002-8087-0887 # Jim Colliander
      CILogonOAuthenticator:
        allowed_idps:
          http://orcid.org/oauth/authorize:
            default: true
            username_derivation:
              # Not actually used - see extra config
              username_claim: "given_name"
            # Don't allow everyone with ORCID to sign in
            allow_all: False
  singleuser:
    profileList:
      - display_name: CPU Only
        default: true
        profile_options:
          image:
            display_name: Environment
            dynamic_image_building:
              enabled: true
            unlisted_choice:
              enabled: true
              display_name: Custom image
              description: Specify your own docker image (must have python and jupyterhub installed in it)
              validation_regex: ^.+:.+$
              validation_message: Must be a publicly available docker image, of form <image-name>:<tag>
              kubespawner_override:
                image: '{value}'
            choices:
              01-python:
                display_name: CryoCloud Python Image
                description: Cryo-geo-ocean environment maintained by the CryoCloud team
                default: true
                kubespawner_override:
                  # Image repo: https://github.com/CryoInTheCloud/hub-image
                  image: quay.io/cryointhecloud/cryo-hub-image:b39d8d901d7b
              02-community-base-image:
                display_name: Community Base Image
                description: Base Image for everyone on ORCID Demo (2026.06.09)
                kubespawner_override:
                  image: quay.io/2i2c/example-image-stack-base:2026-06-09
              03-project1:
                display_name: Project 1 Image
                description: Image for users working on Project 1 (2026.06.09)
                kubespawner_override:
                  image: quay.io/2i2c/example-image-stack-project1:2026-06-09
              03-project2:
                display_name: Project 1 Image
                description: Image for users working on Project 2 (2026.06.09)
                kubespawner_override:
                  image: quay.io/2i2c/example-image-stack-project2:2026-06-09
          resource_allocation:
            display_name: Resource Allocation
            choices:
              mem_2_gb:
                display_name: ~2 GB RAM, ~0.2 CPUs
                description: Up to ~4 CPUs when available
                allowed_groups: &regular_allowed_groups
                  - affiliation:2i2c
                  - affiliation:lab1
                kubespawner_override:
                  mem_guarantee: 1951419879
                  mem_limit: 1951419879
                  cpu_guarantee: 0.22815625
                  cpu_limit: 3.6505
                  node_selector:
                    node.kubernetes.io/instance-type: r5.xlarge
              mem_4_gb:
                display_name: ~4 GB RAM, ~0.5 CPUs
                description: Up to ~4 CPUs when available
                allowed_groups: *regular_allowed_groups
                kubespawner_override:
                  mem_guarantee: 3902839759
                  mem_limit: 3902839759
                  cpu_guarantee: 0.4563125
                  cpu_limit: 3.6505
                  node_selector:
                    node.kubernetes.io/instance-type: r5.xlarge
                default: true
              mem_7_gb:
                display_name: ~7 GB RAM, ~0.9 CPUs
                allowed_groups: *regular_allowed_groups
                description: Up to ~4 CPUs when available
                kubespawner_override:
                  mem_guarantee: 7805679519
                  mem_limit: 7805679519
                  cpu_guarantee: 0.912625
                  cpu_limit: 3.6505
                  node_selector:
                    node.kubernetes.io/instance-type: r5.xlarge
              mem_15_gb:
                display_name: ~15 GB RAM, ~1.8 CPUs
                allowed_groups: *regular_allowed_groups
                description: Up to ~4 CPUs when available
                kubespawner_override:
                  mem_guarantee: 15611359038
                  mem_limit: 15611359038
                  cpu_guarantee: 1.82525
                  cpu_limit: 3.6505
                  node_selector:
                    node.kubernetes.io/instance-type: r5.xlarge
              mem_29_gb:
                display_name: ~29 GB RAM, ~4 CPUs
                allowed_groups: *regular_allowed_groups
                description: ~4 CPUs always available
                kubespawner_override:
                  mem_guarantee: 31222718077
                  mem_limit: 31222718077
                  cpu_guarantee: 3.6505
                  cpu_limit: 3.6505
                  node_selector:
                    node.kubernetes.io/instance-type: r5.xlarge
              mem_60_gb:
