jupyterhub:
  singleuser:
    memory:
      # Increased to help deal with possible kernel restarts
      # https://2i2c.freshdesk.com/a/tickets/567
      guarantee: 384M
      limit: 1.5G
    defaultUrl: /lab
  custom:
    2i2c:
      add_staff_user_ids_to_admin_users: true
      add_staff_user_ids_of_type: google
    homepage:
      templateVars:
        org:
          name: College of San Mateo
          logo_url: https://collegeofsanmateo.edu/marketing/images/logos/CSM_Monogram_process_blue.jpg
          url: https://collegeofsanmateo.edu/
        designed_by:
          name: 2i2c
          url: https://2i2c.org
        operated_by:
          name: CloudBank
          url: http://cloudbank.org/
        funded_by:
          name: CloudBank
          url: http://cloudbank.org/
  hub:
    config:
      JupyterHub:
        authenticator_class: cilogon
      CILogonOAuthenticator:
        allowed_idps:
          http://google.com/accounts/o8/id:
            default: true
            username_derivation:
              username_claim: email
            allowed_domains:
            - my.smccd.edu
            - smccd.edu
      Authenticator:
        admin_users:
        - ericvd@berkeley.edu
        - k_usovich@berkeley.edu
        - sean.smorris@berkeley.edu
        - pachecoh@smccd.edu
        - hellenpacheco@my.smccd.edu
jupyterhub-home-nfs:
  gke:
    volumeId: projects/cb-1003-1696/zones/us-central1-b/disks/hub-nfs-homedirs-csm
