name: Scale node placeholders
on:
  workflow_dispatch:
    inputs:
      cluster:
        description: Name of cluster
        required: true
      hub:
        description: Name of cluster
        required: true
      replicas:
        description: Number of placeholders
        required: true

defaults:
  run:
    shell: bash -l {0}

jobs:
  create-scale-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v7
    - name: Setup Git
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
    - uses: actions/setup-node@v7
      with:
        node-version: '22'

    - name: Setup deploy for ${{ github.event.inputs.cluster }} cluster
      uses: ./.github/actions/setup-deploy

    - name: Apply scale-change
      run: |
        deployer generate node-replicas ${{ github.event.inputs.cluster }} ${{ github.event.inputs.hub }} ${{ github.event.inputs.replicas }}
    - name: Commit change
      run: |
        # Store branch name
        branch_name="placeholders/scale-${{github.event.inputs.cluster}}-${{github.event.inputs.hub}}-${{github.event.inputs.replicas}}-${GITHUB_SHA}"

        # Switch to branch
        git switch -c "${branch_name}"

        # Add changes in config/clusters of existing tracked files
        git add -u config/clusters
        git commit -m "Scale node placeholders to ${{ github.event.inputs.replicas }} for ${{ github.event.inputs.cluster }}/${{ github.event.inputs.hub }}"

        # Push upstream
        git push --set-upstream origin "${branch_name}"
    - name: Create PR
      run: |
        gh pr create \
          --title "[${{ github.event.inputs.cluster }}, ${{github.event.inputs.hub }}] Scale placeholders to ${{ github.event.inputs.replicas }}" \
          --body "This change was performed by a GitHub workflow."
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
