basehub:
  jupyterhub-home-nfs:
    gke:
      volumeId: projects/ciroh-jupyterhub-423218/zones/us-central1-b/disks/hub-nfs-homedirs-workshop
    quotaEnforcer:
      config:
        QuotaManager:
          hard_quota: 40 # in GiB
  jupyterhub:
    custom:
      singleuserAdmin:
        extraVolumeMounts:
      homepage:
        gitRepoBranch: unify-logins-2
    ingress:
      hosts: [workshop.ciroh.awi.2i2c.cloud]
      tls:
      - hosts: [workshop.ciroh.awi.2i2c.cloud]
        secretName: https-auto-tls
    singleuser:
      storage:
        extraVolumeMounts:
        extraVolumes:
      profileList:
        # The mem-guarantees are here so k8s doesn't schedule other pods
        # on these nodes. They need to be just under total allocatable
        # RAM on a node, not total node capacity. Values calculated using
        # https://learnk8s.io/kubernetes-instance-calculator
        #
        # FIXME: These are changed to a temporary node sharing setup based on
        #        the legacy choices to help us pre-warm capacity independent on
        #        the choices users end up making and avoiding running into
        #        persistent disk quotas.
        #
        #        Change PR: https://github.com/2i2c-org/infrastructure/pull/2539
        #        Related event: https://github.com/2i2c-org/infrastructure/issues/2520
        #
        #        This is an interim setup, trying to balance the experience of
        #        the previous 1:1 user:node setup with a node sharing setup. It
        #        is not meant to be retained long term!
        #
        #        -[ ] Make this cluster have a node sharing setup like in the
        #             basehub/daskhub template.
        #
      - display_name: Small
        description: 5GB RAM, 2 CPUs
        default: true
        profile_options: &profile_options
          image:
            display_name: Image
              # Requested in https://2i2c.freshdesk.com/a/tickets/1387
            choices:
              old:
                display_name: Original Pangeo Notebook base image 2023.09.11
                slug: old
                kubespawner_override:
                  image: quay.io/2i2c/awi-ciroh-image:d9f753c83a6b
              new:
                display_name: New Pangeo Notebook base image 2024.04.08
                default: true
                slug: new
                kubespawner_override:
                  image: quay.io/2i2c/awi-ciroh-image:d86a62ae0b85
              rkernel:
                display_name: Notebook with R and Python kernel
                slug: rkernel
                kubespawner_override:
                  image: quay.io/2i2c/awi-ciroh-image:f7f6aa41555b
              devcon7:
                display_name: CIROH Community NextGen Hub
                slug: devcon7
                kubespawner_override:
                  image: quay.io/awiciroh/ngiab-2i2c:v1.2.3
                  image_pull_policy: Always
              devcon8:
                display_name: Community Assets Computation Hub
                slug: devcon8
                kubespawner_override:
                  image: quay.io/awiciroh/symfluence:v1.0.0
                  image_pull_policy: Always
              devcon9:
                display_name: CCNH for ewri
                slug: devcon9
                kubespawner_override:
                  image: quay.io/awiciroh/ewri2026:ewri2026
                  image_pull_policy: Always
              devcon1:
                display_name: Inflect
                slug: devcon1
                kubespawner_override:
                  image: quay.io/awiciroh/devcon26:devcon26-inflect
                  image_pull_policy: Always
        kubespawner_override:
          mem_limit: 7G
          mem_guarantee: 5G
          cpu_limit: 2
          cpu_guarantee: 0.938
          node_selector:
            node.kubernetes.io/instance-type: n2-highmem-16
      - display_name: Medium
        description: 11GB RAM, 4 CPUs
        profile_options: *profile_options
        kubespawner_override:
          mem_limit: 15G
          mem_guarantee: 11G
          cpu_limit: 4
          cpu_guarantee: 1.875
          node_selector:
            node.kubernetes.io/instance-type: n2-highmem-16
      - display_name: Large
        description: 24GB RAM, 8 CPUs
        profile_options: *profile_options
        kubespawner_override:
          mem_limit: 30G
          mem_guarantee: 24G
          cpu_limit: 8
          cpu_guarantee: 3.75
          node_selector:
            node.kubernetes.io/instance-type: n2-highmem-16
      - display_name: Huge
        description: ~59 GB RAM, ~15 CPUs
        profile_options: *profile_options
        kubespawner_override:
          mem_guarantee: 59579452047
          mem_limit: 59579452047
          cpu_guarantee: 15.109639999999999
          cpu_limit: 15.109639999999999
          node_selector:
            node.kubernetes.io/instance-type: n2-standard-16
      extraEnv:
        SCRATCH_BUCKET: gs://awi-ciroh-scratch-workshop/$(JUPYTERHUB_USER)
        PANGEO_SCRATCH: gs://awi-ciroh-scratch-workshop/$(JUPYTERHUB_USER)
    hub:
      allowNamedServers: true
      config:
        JupyterHub:
          authenticator_class: shared-password
        GitHubOAuthenticator: {}
        Authenticator:
          manage_groups: false
          allow_all: true
