cluster-autoscaler:
  enabled: true
  autoDiscovery:
    clusterName: smithsonian
  awsRegion: us-east-2

prometheusIngressAuthSecret:
  enabled: true

grafana:
  grafana.ini:
    server:
      root_url: https://grafana.smithsonian.2i2c.cloud/
    auth.github:
      enabled: true
      allowed_organizations: 2i2c-org
  ingress:
    hosts:
    - grafana.smithsonian.2i2c.cloud
    tls:
    - secretName: grafana-tls
      hosts:
      - grafana.smithsonian.2i2c.cloud

prometheus:
  server:
    ingress:
      enabled: true
      hosts:
      - prometheus.smithsonian.2i2c.cloud
      tls:
      - secretName: prometheus-tls
        hosts:
        - prometheus.smithsonian.2i2c.cloud

calico:
  enabled: true

# FIXME: remove this once eksctl is fixed
nvidiaDevicePlugin:
  aws:
    enabled: true

nginx-ingress:
  enabled: true
  controller:
    ingressClass:
      # Claim the `nginx` ingress class
      create: true

ingress-nginx:
  controller:
    # Turn off this controller
    replicaCount: 0
    # Let go of the `nginx` ingress class
    ingressClassResource:
      enabled: false

clusterEntrypoint:
  targetController: nginx-ingress
