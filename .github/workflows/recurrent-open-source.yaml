name: 'Recurrent: Upstream OSS Contributions'
on:
  workflow_dispatch:
  schedule:
  - cron: 0 4 * * 3

env:
  issue_title: Upstream OSS Contributions

jobs:
  compute-week:
    uses: ./.github/workflows/is-this-sprint-week.yaml

  check-if-issue-already-exists:
    runs-on: ubuntu-latest
    outputs:
      id: ${{ steps.find-issue.outputs.id }}
    steps:
    - uses: benlei/find-issue-by-title@v1
      id: find-issue
      with:
        title: ${{ env.issue_title }}
        state: open
        labels: recurrent

  create-issue:
    if: ${{ needs.compute-week.outputs.valid_week == 'True' && needs.check-if-issue-already-exists.outputs.id == '' }}
    needs:
    - compute-week
    - check-if-issue-already-exists
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
    - uses: actions/checkout@v6
    - name: Get Deadline
      id: get_deadline
      run: |
        echo "deadline_as_iso_date=$(date -d '+28 days' +"%Y-%m-%d")" >> $GITHUB_ENV
    - name: Setup recurrent issue
      uses: ./.github/actions/setup-recurrent-issues
      with:
        label: good-community-citizen
        title: ${{ env.issue_title }}
        body: |
          ### Context

          See this 2i2c blog post on [Foundational Contributions](https://2i2c.org/blog/foundational-contributions/)

          ### What we need to do

          Gather ideas for upstream OSS upstream in this issue to play for the next iteration. Cap or split the work into 2 or 3 points for effort.

          Take a look at [JupyterHub PR triage board](https://github.com/orgs/jupyterhub/projects/4/views/9) for inspiration 🌈

          ### Definition of Done

          - [ ] We agree on a contribution to work on for next iteration.
        fields: Status,Estimate,End date
        values: Up Next,2,${{ env.deadline_as_iso_date }}
        GH_TOKEN: ${{ secrets.PROJECT_BOARD_PAT_TOKEN }}
