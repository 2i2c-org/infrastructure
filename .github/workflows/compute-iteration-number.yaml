# Reusable workflow like
# https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
#
name: Compute current iteration number

on:
  workflow_call:
    # Map the workflow outputs to job outputs
    outputs:
      iteration:
        description: Current iteration number
        value: ${{ jobs.compute-iteration.outputs.iteration }}
jobs:
  # Run the action every other week
  compute-iteration:
    runs-on: ubuntu-latest
    outputs:
      iteration: ${{ steps.compute.outputs.iteration }}
    steps:
    - name: Compute number
      id: compute
      run: |
        # Start date of Iteration 1
        START_DATE="2024-10-16"
        ITER_DAYS=14

        NOW=$(date +%s)
        # convert start date to seconds
        START_S=$(date -d "$START_DATE" +%s)

        # compute days between start and now
        DAYS=$(( (NOW - START_S) / 86400 ))

        # compute iteration number
        ITER_NUM=$(( (DAYS / ITER_DAYS) + 1 ))

        echo "iteration=$ITER_NUM" >> $GITHUB_OUTPUT


