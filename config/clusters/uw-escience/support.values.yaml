prometheus:
  server:
    persistentVolume:
      size: 100Gi
    ingress:
      enabled: true
      hosts:
      - prometheus.uw-escience.2i2c.cloud
      tls:
      - secretName: prometheus-tls
        hosts:
        - prometheus.uw-escience.2i2c.cloud

grafana:
  grafana.ini:
    server:
      root_url: https://grafana.uw-escience.2i2c.cloud/
  auth.github:
    enabled: true
    allowed_organizations: 2i2c-org
  persistence:
    # We don't need 10Gi on the Grafana persistent directory
    size: 1Gi
  ingress:
    hosts:
    - grafana.uw-escience.2i2c.cloud
    tls:
    - secretName: grafana-tls
      hosts:
      - grafana.uw-escience.2i2c.cloud


cluster-autoscaler:
  enabled: true
  autoDiscovery:
    clusterName: uw-escience
  awsRegion: us-west-2

calico:
  enabled: true


# FIXME: remove this once eksctl is fixed
nvidiaDevicePlugin:
  aws:
    enabled: true


nginx-ingress:
  enabled: true
  controller:
    ingressClass:
      # Claim the `nginx` ingress class
      create: true

ingress-nginx:
  controller:
    # Turn off this controller
    replicaCount: 0
    # Let go of the `nginx` ingress class
    ingressClassResource:
      enabled: false

clusterEntrypoint:
  targetController: nginx-ingress
