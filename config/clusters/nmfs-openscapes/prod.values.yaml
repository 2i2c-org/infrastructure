nfs:
  pv:
    serverIP: 10.100.33.250

jupyterhub:
  singleuser:
    extraEnv:
      SCRATCH_BUCKET: s3://nmfs-openscapes-scratch/$(JUPYTERHUB_USER)
      PERSISTENT_BUCKET: s3://nmfs-openscapes-persistent/$(JUPYTERHUB_USER)
    storage:
      extraVolumeMounts:
        # A shared folder readable & writeable by everyone
        1-shared-public-volumemount:
          name: home
          mountPath: /home/jovyan/shared-public
          subPath: _shared-public
          readOnly: false
  hub:
    config:
      JupyterHub:
        authenticator_class: github
      GitHubOAuthenticator:
        allowed_organizations:
        - fish-pace:2026-hackweek-jupyterhub
        - nmfs-openscapes:longterm-access-2i2c
        - nmfs-openscapes:mentors
        - nmfs-openscapes:2026-jupyterhub
        - nmfs-openscapes:2024-nmfs-champions-cohort

jupyterhub-home-nfs:
  eks:
    volumeId: vol-004cc1b60a1dfb9e4
  quotaEnforcer:
    config:
      QuotaManager:
        hard_quota: 20 # in GiB
binderhub-service:
  config:
    BinderHub:
      image_prefix: quay.io/imagebuilding-non-gcp-hubs/nmfs-openscapes-prod-
  extraEnv:
  - name: JUPYTERHUB_API_URL
    value: http://hub.prod.svc.cluster.local:8081/hub/api
