nfs:
  pv:
    serverIP: 10.100.150.169

jupyterhub:
  hub:
    extraFiles:
      usage_quotas_config:
        mountPath: /usr/local/etc/jupyterhub/jupyterhub_config.d/jupyterhub_usage_quotas_config.py
        stringData: |
          c.UsageConfig.prometheus_url = "http://support-prometheus-server.support.svc.cluster.local"
          c.UsageConfig.hub_namespace = "prod"
          c.UsageViewer.public_hub_url = "https://hub.disasters.2i2c.cloud/"
          c.UsageViewer.enable_compute = False

dask-gateway:
  gateway:
    backend:
      imagePullSecrets: [name: image-pull-secret]

binderhub-service:
  config:
    BinderHub:
      image_prefix: quay.io/imagebuilding-non-gcp-hubs/disasters-prod-
jupyterhub-home-nfs:
  eks:
    volumeId: vol-00174260142d50e1b
  quotaEnforcer:
    config:
      QuotaManager:
        hard_quota: 100 # in GiB
