cluster-autoscaler:
  enabled: true
  autoDiscovery:
    clusterName: nasa-cryo
  awsRegion: us-west-2

grafana:
  grafana.ini:
    server:
      root_url: https://grafana.cryointhecloud.2i2c.cloud/
    auth.github:
      enabled: true
      allowed_organizations: 2i2c-org
  ingress:
    hosts:
    - grafana.cryointhecloud.2i2c.cloud
    tls:
    - secretName: grafana-tls
      hosts:
      - grafana.cryointhecloud.2i2c.cloud

prometheus:
  server:
    ingress:
      enabled: true
      hosts:
      - prometheus.cryointhecloud.2i2c.cloud
      tls:
      - secretName: prometheus-tls
        hosts:
        - prometheus.cryointhecloud.2i2c.cloud

    extraArgs:
      web.config.file: /etc/config/web.yml
calico:
  enabled: true

# FIXME: remove this once eksctl is fixed
nvidiaDevicePlugin:
  aws:
    enabled: true

nginx-ingress:
  enabled: true
  controller:
    ingressClass:
      # Claim the `nginx` ingress class
      create: true

ingress-nginx:
  controller:
    # Turn off this controller
    replicaCount: 0
    # Let go of the `nginx` ingress class
    ingressClassResource:
      enabled: false

clusterEntrypoint:
  targetController: nginx-ingress
