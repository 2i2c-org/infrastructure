name: Add a notice to monitor hub deployment
description: >-
  Adds a notice to pull request that tracks the deploment to the infra.

# inputs configuration reference:
# https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions#inputs
#
inputs:
  workflow_name:
    description: Name of workflow that deploys the hubs
    default: Deploy and test hubs
    required: false
  github_token:
    description: GitHub token to create comments
    required: true
# runs (for composite actions) configuration reference:
# https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions#runs-for-composite-actions
#
# Note that while this section looks almost like the steps of a job in a
# workflow, it is different!
#
runs:
  using: composite
  steps:
  - run: pipx run ${{ github.action_path }}/action.py
    shell: bash
    env:
      COMMIT_MSG: ${{ github.event.head_commit.message }}
      GITHUB_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ inputs.github_token }}
      BRANCH: main
      EVENT: push
        # WORKFLOW_NAME *MUST* match what is set in the name field in the
        # deploy-hubs.yaml workflow file
        # https://github.com/2i2c-org/infrastructure/blob/HEAD/.github/workflows/deploy-hubs.yaml
      WORKFLOW_NAME: ${{ inputs.workflow_name }}
