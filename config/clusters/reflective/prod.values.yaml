nfs:
  pv:
    serverIP: 10.100.36.26
jupyterhub:
  ingress:
    hosts: [reflective.2i2c.cloud]
    tls:
    - hosts: [reflective.2i2c.cloud]
      secretName: https-auto-tls
  singleuser:
    extraEnv:
      SCRATCH_BUCKET: s3://reflective-scratch-prod/$(JUPYTERHUB_USER)
      PANGEO_SCRATCH: s3://reflective-scratch-prod/$(JUPYTERHUB_USER)
      PERSISTENT_BUCKET: s3://reflective-persistent-prod/$(JUPYTERHUB_USER)
      PERSISTENT_BUCKET_LARGE: s3://reflective-persistent-prod-large/$(JUPYTERHUB_USER)
dask-gateway:
  gateway:
    backend:
      scheduler:
        extraPodConfig:
          nodeSelector:
            2i2c/hub-name: prod
      worker:
        extraPodConfig:
          nodeSelector:
            2i2c/hub-name: prod
jupyterhub-home-nfs:
  eks:
    volumeId: vol-0ac31776780207b43
  quotaEnforcer:
    config:
      QuotaManager:
        hard_quota: 20 # in GiB
