basehub:
  jupyterhub:
    custom:
      homepage:
        gitRepoBranch: staging
        gitRepoUrl: https://github.com/US-GHG-Center/ghgc-hub-homepage
    hub:
      image:
        # Usage quotas 0.1.2 and fancy-profiles 0.6.0
        name: quay.io/2i2c/jupyterhub-usage-quotas
        tag: 90c1065209cf89554c2e7e73b7e2120c5d27a167
      extraFiles:
        usage_quotas_config:
          mountPath: /usr/local/etc/jupyterhub/jupyterhub_config.d/jupyterhub_usage_quotas_config.py
          stringData: |
            import os
            c.UsageConfig.prometheus_url = "http://support-prometheus-server.support.svc.cluster.local"
            c.UsageConfig.hub_namespace = "staging"
            c.UsageViewer.public_hub_url = "https://staging.ghg.2i2c.cloud/"
            c.UsageViewer.enable_compute = False
      services:
        usage-quota:
          url: http://hub:9000
          display: true
          oauth_no_confirm: true
          command:
          - python
          - -m
          - jupyterhub_usage_quotas.services.usage_viewer
          - --config-files=/usr/local/etc/jupyterhub/jupyterhub_config.d/jupyterhub_usage_quotas_config.py
          - --config-files=/usr/local/etc/jupyterhub/jupyterhub_config.d/jupyterhub_usage_quotas_config_secret.py
      loadRoles:
        usage-quota-service:
          scopes:
          - read:users
          - list:services
          - read:services
          services:
          - usage-quota
        user:
          scopes:
          - self
          - access:services!service=usage-quota
          - access:services!service=dask-gateway
          - access:services!service=binder
      service:
        extraPorts:
        - port: 9000
          targetPort: 9000
          name: usage-quota
      networkPolicy:
        ingress:
        - ports:
          - port: 9000
          from:
              # Allow traffic from the hub pod itself for Jupyterhub's internal healthchecks
              # for hub managed services.
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: hub
                app.kubernetes.io/name: jupyterhub
              # Allow traffic from the proxy api pod
          - podSelector:
              matchLabels:
                hub.jupyter.org/network-access-hub: 'true'
        - ports:
          - port: 8081
          from:
              # Allow traffic from the hub pod itself for oauth calls from the usage-quota service to the hub api.
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: hub
                app.kubernetes.io/name: jupyterhub
  binderhub-service:
    config:
      BinderHub:
        image_prefix: quay.io/imagebuilding-non-gcp-hubs/nasa-ghg-staging-
    extraEnv:
    - name: JUPYTERHUB_API_URL
      value: https://staging.ghg.2i2c.cloud/hub/api

  jupyterhub-home-nfs:
    eks:
      volumeId: vol-01889854859d8768d

  nfs:
    pv:
      serverIP: 10.100.155.30
