# Call Asana Sync
#
# Add this file to any 2i2c-org repo whose issues should sync to Asana
# (e.g. Community Success Hours tracking).
#
# Place at: .github/workflows/call-asana-sync.yml
#
# Prerequisites:
#   - The org-level secrets ASANA_ACCESS_TOKEN and CSH_SYNC_PAT must be set
#   - The repo must have a "CSH" or "asana-sync" label created
#   - The 2i2c-org/data-sync repo must exist with the reusable workflow

name: Asana issue sync

on:
  issues:
    types: [labeled, edited, assigned, unassigned, milestoned, demilestoned, closed, reopened]

jobs:
  sync:
    # For 'labeled' events: only fire when a trigger label is the one being added.
    # For all other events: fire if the issue already carries a trigger label.
    if: >-
      (github.event.action == 'labeled' && (github.event.label.name == 'CSH' || github.event.label.name == 'asana-sync'))
      || (github.event.action != 'labeled' && (contains(toJson(github.event.issue.labels.*.name), 'CSH') || contains(toJson(github.event.issue.labels.*.name), 'asana-sync')))
    uses: 2i2c-org/data-sync/.github/workflows/asana-issues-sync.yml@main
    secrets: inherit
